<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background: deep space dark -->
  <rect width="64" height="64" rx="14" fill="#040215"/>
  <!-- Subtle purple border glow -->
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none" stroke="#3A1090" stroke-width="1.5"/>
  <!-- "MG" monogram, bold -->
  <text
    x="32" y="43"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="900"
    fill="url(#grad-a)"
    text-anchor="middle"
    letter-spacing="-1"
  >MG</text>
  <!-- Gradient definition -->
  <defs>
    <linearGradient id="grad-a" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E0C8FF"/>
      <stop offset="100%" stop-color="#C49FFF"/>
    </linearGradient>
  </defs>
</svg>
